<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Racha-cuca</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header class="cabecalho">RACHA-CUCA</header>
    <div class="main-layout">
        <aside class="sidebar">
            <div class="card">
                <h3>CONFIGURAÇÃO</h3>
                <label for="modoJogo">Modo de Início:</label>
                <select id="modoJogo">
                    <option value="aleatorio">Aleatório (Embaralhar)</option>
                    <option value="manual">Manual (Digitar sequência)</option>
                </select>
            </div>

            <div class="card">
                <h3>ESTATÍSTICAS</h3>
                <p>Passos: <span id="displayPassos">0</span></p>
            </div>

            <button id="iniciar">INICIAR JOGO</button>
        </aside>

        <div class="container">
            <div id="corpoJogo">
                <div class="quadrado esconder">0</div>
                <div class="quadrado">1</div>
                <div class="quadrado">2</div>
                <div class="quadrado">3</div>
                <div class="quadrado">4</div>
                <div class="quadrado">5</div>
                <div class="quadrado">6</div>
                <div class="quadrado">7</div>
                <div class="quadrado">8</div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
